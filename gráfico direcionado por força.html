Highcharts.addEvent(Highcharts.Series, 'afterSetOptions', function (e) {
    const colors = Highcharts.getOptions().colors;

    if (this instanceof Highcharts.Series.types.networkgraph && e.options.id === 'kopp-tree') {

                nodes['Concorrentes KOPP'] = { id: 'Concorrentes KOPP', marker: { radius: 20 } };

                nodes[link[1]] = { id: link[1], color: nodes[link[0]].color };
            }
        });

        e.options.nodes = Object.keys(nodes).map(id => nodes[id]);
    }
});
